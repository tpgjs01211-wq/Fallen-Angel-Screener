<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fallen Angel Screener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #58a6ff; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; color: #8b949e; margin-bottom: 2rem; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.8rem 1.5rem;
      font-size: 0.95rem;
      color: #8b949e;
    }
    .badge span { color: #3fb950; font-weight: 600; }
  </style>
</head>
<body>
  <div class="logo">&#128200;</div>
  <h1>Fallen Angel Screener</h1>
  <p>
    S&amp;P 500 고품질 낙폭 과대 종목을 매일 아침 자동으로 스크리닝합니다.<br />
    첫 번째 리포트는 GitHub Actions가 실행된 후 이 페이지에 자동으로 게시됩니다.
  </p>
  <div class="badge">
    매일 <span>07:00 KST</span> 자동 업데이트 &nbsp;&#8226;&nbsp; Powered by GitHub Actions
  </div>
</body>
</html>
